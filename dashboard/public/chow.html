<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0d1b2e; color: #fff; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #0d1b2e 0%, #1a2f4e 100%);
    border-bottom: 2px solid #D4AF37;
    padding: 16px 20px;
    text-align: center;
  }
  header h1 { color: #D4AF37; font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; }
  header p { color: #8899aa; font-size: 0.75rem; margin-top: 4px; }

  .tabs {
    display: flex;
    border-bottom: 1px solid #1e3050;
  }
  .tab {
    flex: 1; padding: 12px; text-align: center; cursor: pointer;
    font-size: 0.85rem; color: #8899aa; border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab.active { color: #D4AF37; border-bottom-color: #D4AF37; }

  .view { display: none; padding: 16px; }
  .view.active { display: block; }

  /* Scanner */
  #reader { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 12px; overflow: hidden; border: 2px solid #D4AF37; }

  .result-box {
    margin: 16px auto; max-width: 400px;
    border-radius: 12px; padding: 20px; text-align: center;
    display: none;
  }
  .result-box.admitted {
    background: linear-gradient(135deg, #0a2e1a, #0d3d20);
    border: 2px solid #2ecc71;
  }
  .result-box.already {
    background: linear-gradient(135deg, #2e1a00, #3d2800);
    border: 2px solid #f39c12;
  }
  .result-box.unknown {
    background: linear-gradient(135deg, #2e0a0a, #3d1010);
    border: 2px solid #e74c3c;
  }
  .result-icon { font-size: 3rem; margin-bottom: 10px; }
  .result-name { font-size: 1.4rem; font-weight: bold; color: #D4AF37; }
  .result-sub { font-size: 0.85rem; color: #aabbcc; margin-top: 6px; }
  .result-status { font-size: 1rem; margin-top: 8px; font-weight: bold; }
  .admitted .result-status { color: #2ecc71; }
  .already .result-status { color: #f39c12; }
  .unknown .result-status { color: #e74c3c; }

  .btn-scan-again {
    margin-top: 14px; padding: 10px 28px;
    background: #D4AF37; color: #0d1b2e;
    border: none; border-radius: 8px;
    font-weight: bold; font-size: 0.9rem;
    cursor: pointer;
  }

  /* Stats bar */
  .stats-bar {
    display: flex; gap: 10px; margin: 0 0 16px 0;
  }
  .stat-card {
    flex: 1; background: #1a2f4e; border-radius: 10px;
    padding: 12px 8px; text-align: center;
    border: 1px solid #1e3050;
  }
  .stat-num { font-size: 1.6rem; font-weight: bold; color: #D4AF37; }
  .stat-label { font-size: 0.7rem; color: #8899aa; text-transform: uppercase; margin-top: 2px; }

  /* Guest list */
  .search-box {
    width: 100%; padding: 10px 14px;
    background: #1a2f4e; border: 1px solid #2a4060;
    border-radius: 8px; color: #fff; font-size: 0.9rem;
    margin-bottom: 12px;
  }
  .search-box::placeholder { color: #556677; }

  .guest-item {
    display: flex; align-items: center; justify-content: space-between;
    background: #1a2f4e; border-radius: 8px; padding: 10px 14px;
    margin-bottom: 8px; border-left: 3px solid transparent;
    cursor: pointer; transition: all 0.2s;
  }
  .guest-item.checked { border-left-color: #2ecc71; }
  .guest-item.pending { border-left-color: #556677; }
  .guest-item:hover { background: #1e3a5e; }
  .guest-name { font-size: 0.9rem; font-weight: 600; }
  .guest-id { font-size: 0.75rem; color: #8899aa; }
  .badge {
    padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold;
  }
  .badge.in { background: #0a3d20; color: #2ecc71; }
  .badge.pending { background: #1e2d40; color: #8899aa; }

  .filter-btns { display: flex; gap: 8px; margin-bottom: 12px; }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid #2a4060;
    background: transparent; color: #8899aa; font-size: 0.8rem; cursor: pointer;
  }
  .filter-btn.active { background: #D4AF37; color: #0d1b2e; border-color: #D4AF37; font-weight: bold; }

  .scan-hint {
    text-align: center; color: #556677; font-size: 0.8rem; margin: 12px 0;
    padding: 10px; background: #111e30; border-radius: 8px;
  }
  .manual-btn {
    width: 100%; max-width: 400px; display: block; margin: 10px auto;
    padding: 10px; background: #1a2f4e; color: #D4AF37;
    border: 1px dashed #D4AF37; border-radius: 8px;
    font-size: 0.85rem; cursor: pointer; text-align: center;
  }
</style>

// State
const checkedIn = {};
let currentFilter = 'all';
let scanner = null;
let scanning = true;

function updateStats() {
  const total = GUESTS.length;
  const inCount = Object.keys(checkedIn).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-in').textContent = inCount;
  document.getElementById('stat-pending').textContent = total - inCount;
}

// ── QR Scanner ───────────────────────────────────────────────────────────────
function startScanner() {
  scanner = new Html5Qrcode("reader");
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 220, height: 220 } },
    onScanSuccess,
    () => {}
  ).catch(err => {
    document.getElementById('reader').innerHTML =
      `<div style="padding:20px;text-align:center;color:#e74c3c;">
        ⚠️ Camera access denied.<br><small>Please allow camera permissions and reload.</small>
      </div>`;
  });
}

function onScanSuccess(decodedText) {
  if (!scanning) return;
  scanning = false;
  scanner.pause();

  // Parse QR data: GUEST_ID:001|NAME:ESV Collins Alabi|PHONE:...
  const match = decodedText.match(/GUEST_ID:(\d+)\|NAME:(.+?)\|PHONE:(.*)/);
  const resultBox = document.getElementById('result-box');
  resultBox.style.display = 'block';

  if (match) {
    const id = match[1].padStart(3, '0');
    const name = match[2];
    const guest = GUESTS.find(g => g.id === id);

    if (!guest) {
      showResult('unknown', '❓', name, `ID: #${id}`, 'Not on guest list');
    } else if (checkedIn[id]) {
      const time = checkedIn[id];
      showResult('already', '⚠️', name, `Already admitted at ${time}`, 'Duplicate Entry');
    } else {
      const now = new Date().toLocaleTimeString('en-NG', {hour:'2-digit', minute:'2-digit'});
      checkedIn[id] = now;
      updateStats();
      renderList();
      showResult('admitted', '✅', name, `Guest #${id} • ${now}`, 'ACCESS GRANTED');
      // Haptic feedback on mobile
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    }
  } else {
    showResult('unknown', '❓', 'Unknown QR Code', decodedText.substring(0, 40), 'Not a valid invite');
  }
}

function showResult(type, icon, name, sub, status) {
  const box = document.getElementById('result-box');
  box.className = `result-box ${type}`;
  document.getElementById('result-icon').textContent = icon;
  document.getElementById('result-name').textContent = name;
  document.getElementById('result-sub').textContent = sub;
  document.getElementById('result-status').textContent = status;
}

function resumeScanner() {
  document.getElementById('result-box').style.display = 'none';
  scanning = true;
  scanner.resume();
}

// ── Guest List ───────────────────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const list = document.getElementById('guest-list');
  list.innerHTML = '';

  const filtered = GUESTS.filter(g => {
    const matchSearch = g.name.toLowerCase().includes(q);
    const isIn = !!checkedIn[g.id];
    if (currentFilter === 'in') return matchSearch && isIn;
    if (currentFilter === 'pending') return matchSearch && !isIn;
    return matchSearch;
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#556677;padding:30px;">No guests found</div>';
    return;
  }

  filtered.forEach(g => {
    const isIn = !!checkedIn[g.id];
    const time = checkedIn[g.id] || '';
    const div = document.createElement('div');
    div.className = `guest-item ${isIn ? 'checked' : 'pending'}`;
    div.innerHTML = `
      <div>
        <div class="guest-name">${g.name}</div>
        <div class="guest-id">#${g.id}${time ? ' · Admitted ' + time : ''}</div>
      </div>
      <span class="badge ${isIn ? 'in' : 'pending'}">${isIn ? 'IN ✓' : 'Pending'}</span>
    `;
    div.onclick = () => {
      if (!isIn) {
        const now = new Date().toLocaleTimeString('en-NG', {hour:'2-digit', minute:'2-digit'});
        checkedIn[g.id] = now;
        updateStats();
        renderList();
      }
    };
    list.appendChild(div);
  });
}

function switchTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'guests') renderList();
}

// Init
updateStats();
startScanner();
