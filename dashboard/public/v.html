<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID — Notes</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --bg2: #16161a;
    --bg3: #1e1e24;
    --bg4: #26262e;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8e8f0;
    --text2: #8888a0;
    --text3: #555568;
    --accent: #7c6af7;
    --accent2: #9d8fff;
    --accent-glow: rgba(124,106,247,0.15);
    --green: #3dd68c;
    --red: #f76a6a;
    --amber: #f7c56a;
    --cyan: #6ad4f7;
    --pink: #f76ab4;
    --font-ui: 'Syne', sans-serif;
    --font-code: 'JetBrains Mono', monospace;
    --radius: 8px;
    --radius-lg: 14px;
    --sidebar: 260px;
    --toolbar: 44px;
    --statusbar: 28px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── TITLEBAR ── */
  #titlebar {
    height: 42px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
    position: relative;
  }
  #logo {
    font-family: var(--font-ui);
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 0.12em;
    color: var(--accent2);
    text-transform: uppercase;
  }
  #logo span { color: var(--text3); }

  #tabs-container {
    display: flex;
    align-items: center;
    gap: 2px;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
  }
  #tabs-container::-webkit-scrollbar { display: none; }

  .tab {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 14px 0 14px;
    height: 32px;
    border-radius: 6px 6px 0 0;
    font-size: 12px;
    font-family: var(--font-code);
    color: var(--text3);
    cursor: pointer;
    white-space: nowrap;
    border: 1px solid transparent;
    border-bottom: none;
    transition: all 0.15s;
    flex-shrink: 0;
    position: relative;
  }
  .tab:hover { color: var(--text2); background: var(--bg3); }
  .tab.active {
    background: var(--bg);
    color: var(--text);
    border-color: var(--border);
    border-bottom-color: var(--bg);
  }
  .tab .tab-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .tab.modified .tab-dot { opacity: 1; }
  .tab .tab-close {
    width: 16px; height: 16px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    color: var(--text3);
    opacity: 0;
    transition: all 0.15s;
    cursor: pointer;
    line-height: 1;
  }
  .tab:hover .tab-close, .tab.active .tab-close { opacity: 1; }
  .tab .tab-close:hover { background: rgba(247,106,106,0.2); color: var(--red); }

  #new-tab-btn {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    line-height: 1;
  }
  #new-tab-btn:hover { background: var(--bg3); color: var(--text); }

  #titlebar-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
    flex-shrink: 0;
  }
  .tbar-btn {
    height: 28px; padding: 0 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: var(--font-code);
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tbar-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }
  .tbar-btn.accent { background: var(--accent-glow); border-color: rgba(124,106,247,0.3); color: var(--accent2); }
  .tbar-btn.accent:hover { background: rgba(124,106,247,0.25); }

  /* ── TOOLBAR ── */
  #toolbar {
    height: var(--toolbar);
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 4px;
    flex-shrink: 0;
  }
  .tool-sep { width: 1px; height: 20px; background: var(--border); margin: 0 6px; flex-shrink: 0; }
  .tool-btn {
    height: 30px; min-width: 30px; padding: 0 8px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-family: var(--font-code);
    font-size: 12px;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tool-btn:hover { background: var(--bg3); color: var(--text); }
  .tool-btn.active { background: var(--accent-glow); color: var(--accent2); }
  .tool-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 1.8; flex-shrink: 0; }

  #word-count-badge {
    margin-left: auto;
    font-family: var(--font-code);
    font-size: 11px;
    color: var(--text3);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* ── MAIN AREA ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: width 0.2s ease, opacity 0.2s;
    overflow: hidden;
  }
  #sidebar.collapsed { width: 0; opacity: 0; }

  #sidebar-header {
    padding: 12px 14px 8px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #sidebar-header span {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
  }

  #search-box {
    margin: 10px 10px 6px;
    position: relative;
    flex-shrink: 0;
  }
  #search-input {
    width: 100%;
    height: 32px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-code);
    font-size: 12px;
    padding: 0 10px 0 32px;
    outline: none;
    transition: border-color 0.15s;
  }
  #search-input:focus { border-color: var(--border2); }
  #search-input::placeholder { color: var(--text3); }
  .search-icon {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 13px;
    pointer-events: none;
  }

  #notes-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 6px;
    scrollbar-width: thin;
    scrollbar-color: var(--bg4) transparent;
  }
  #notes-list::-webkit-scrollbar { width: 4px; }
  #notes-list::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

  .note-item {
    padding: 10px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
    margin-bottom: 2px;
    position: relative;
  }
  .note-item:hover { background: var(--bg3); }
  .note-item.active { background: var(--accent-glow); }
  .note-item.active .note-title { color: var(--accent2); }
  .note-title {
    font-family: var(--font-code);
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .note-preview {
    font-family: var(--font-code);
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .note-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
  }
  .note-date { font-family: var(--font-code); font-size: 10px; color: var(--text3); }
  .note-tag {
    font-size: 9px;
    font-family: var(--font-code);
    padding: 2px 6px;
    border-radius: 20px;
    background: var(--bg4);
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .note-tag.js { background: rgba(247,197,106,0.1); color: var(--amber); }
  .note-tag.md { background: rgba(61,214,140,0.1); color: var(--green); }
  .note-tag.txt { background: rgba(106,212,247,0.1); color: var(--cyan); }
  .note-tag.idea { background: rgba(247,106,180,0.1); color: var(--pink); }

  .note-item .note-del {
    position: absolute;
    right: 8px; top: 50%;
    transform: translateY(-50%);
    width: 20px; height: 20px;
    display: none;
    align-items: center; justify-content: center;
    border-radius: 4px;
    color: var(--text3);
    font-size: 14px;
    cursor: pointer;
  }
  .note-item:hover .note-del { display: flex; }
  .note-item .note-del:hover { background: rgba(247,106,106,0.15); color: var(--red); }

  #sidebar-footer {
    padding: 10px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #new-note-btn {
    width: 100%;
    height: 34px;
    background: var(--accent-glow);
    border: 1px solid rgba(124,106,247,0.25);
    border-radius: 8px;
    color: var(--accent2);
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    letter-spacing: 0.04em;
  }
  #new-note-btn:hover { background: rgba(124,106,247,0.25); }

  /* ── EDITOR AREA ── */
  #editor-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  #editor-wrapper {
    flex: 1;
    overflow: hidden;
    position: relative;
    display: flex;
  }

  /* line numbers */
  #line-numbers {
    width: 52px;
    background: var(--bg);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    overflow: hidden;
    flex-shrink: 0;
    font-family: var(--font-code);
    font-size: 13px;
    line-height: 1.7;
    color: var(--text3);
    text-align: right;
    padding-right: 10px;
    transition: opacity 0.2s;
    user-select: none;
  }
  #line-numbers.hidden { display: none; }

  #editor {
    flex: 1;
    background: var(--bg);
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-code);
    font-size: 15px;
    line-height: 1.7;
    padding: 20px 28px;
    resize: none;
    scrollbar-width: thin;
    scrollbar-color: var(--bg4) transparent;
    tab-size: 2;
    caret-color: var(--accent2);
    user-select: text;
  }
  #editor::-webkit-scrollbar { width: 6px; }
  #editor::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
  #editor::selection { background: rgba(124,106,247,0.25); }
  #editor.focus-mode { padding: 40px 15%; font-size: 16px; line-height: 1.9; }

  /* FOCUS MODE overlay blur */
  #focus-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    background: linear-gradient(to bottom, rgba(14,14,16,0.7) 0%, transparent 12%, transparent 88%, rgba(14,14,16,0.7) 100%);
  }
  #focus-overlay.active { opacity: 1; }

  /* ── FIND/REPLACE BAR ── */
  #findbar {
    position: absolute;
    top: 8px; right: 16px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 10px 14px;
    display: none;
    gap: 8px;
    align-items: center;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  #findbar.open { display: flex; }
  #findbar input {
    height: 28px; width: 180px;
    background: var(--bg4);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-code);
    font-size: 12px;
    padding: 0 10px;
    outline: none;
  }
  #findbar input:focus { border-color: var(--accent); }
  .find-count { font-family: var(--font-code); font-size: 11px; color: var(--text3); min-width: 50px; }
  .find-btn {
    height: 28px; width: 28px;
    background: var(--bg4);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text2);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
  }
  .find-btn:hover { background: var(--bg); color: var(--text); }

  /* ── STATUS BAR ── */
  #statusbar {
    height: var(--statusbar);
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 16px;
    font-family: var(--font-code);
    font-size: 11px;
    color: var(--text3);
    flex-shrink: 0;
  }
  #statusbar span { display: flex; align-items: center; gap: 5px; }
  #statusbar .sep { width: 1px; height: 12px; background: var(--border); }
  #statusbar .status-mode {
    margin-left: auto;
    background: var(--accent-glow);
    color: var(--accent2);
    padding: 2px 10px;
    border-radius: 20px;
    border: 1px solid rgba(124,106,247,0.2);
  }
  #statusbar .status-saved { color: var(--green); }

  /* ── COMMAND PALETTE ── */
  #cmd-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding-top: 120px;
  }
  #cmd-overlay.open { display: flex; }
  #cmd-palette {
    width: 560px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }
  #cmd-input-wrap {
    display: flex; align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  #cmd-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-code);
    font-size: 14px;
    caret-color: var(--accent2);
  }
  #cmd-input::placeholder { color: var(--text3); }
  .cmd-icon { font-size: 16px; color: var(--text3); }
  #cmd-results { max-height: 340px; overflow-y: auto; padding: 6px; }
  .cmd-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .cmd-item:hover, .cmd-item.selected { background: var(--bg4); }
  .cmd-item-icon {
    width: 32px; height: 32px;
    background: var(--bg4);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .cmd-item.selected .cmd-item-icon { background: var(--accent-glow); }
  .cmd-item-text { flex: 1; }
  .cmd-item-title { font-family: var(--font-code); font-size: 13px; color: var(--text); }
  .cmd-item-sub { font-family: var(--font-code); font-size: 11px; color: var(--text3); margin-top: 1px; }
  .cmd-item-kbd {
    font-family: var(--font-code);
    font-size: 10px;
    color: var(--text3);
    background: var(--bg4);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
  }
  #cmd-footer {
    padding: 8px 16px;
    border-top: 1px solid var(--border);
    font-family: var(--font-code);
    font-size: 11px;
    color: var(--text3);
    display: flex; gap: 16px;
  }
  .cmd-hint { display: flex; align-items: center; gap: 5px; }
  .cmd-hint kbd {
    background: var(--bg4); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 5px; font-size: 10px;
  }

  /* ── SNIPPETS PANEL ── */
  #snippets-panel {
    position: absolute;
    right: 16px; bottom: 48px;
    width: 300px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    overflow: hidden;
    display: none;
    z-index: 50;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  #snippets-panel.open { display: block; }
  #snippets-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    display: flex; align-items: center; justify-content: space-between;
  }
  .snippet-item {
    padding: 10px 14px;
    cursor: pointer;
    transition: background 0.1s;
    border-bottom: 1px solid var(--border);
  }
  .snippet-item:last-child { border-bottom: none; }
  .snippet-item:hover { background: var(--bg4); }
  .snippet-trigger {
    font-family: var(--font-code);
    font-size: 12px;
    color: var(--accent2);
    margin-bottom: 2px;
  }
  .snippet-desc { font-family: var(--font-code); font-size: 11px; color: var(--text3); }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 50px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 30px;
    padding: 8px 20px;
    font-family: var(--font-code);
    font-size: 12px;
    color: var(--text);
    z-index: 2000;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── RENAME INPUT ── */
  .note-title-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--accent);
    color: var(--text);
    font-family: var(--font-code);
    font-size: 12px;
    outline: none;
    width: 100%;
  }

  /* ── SCROLLBAR global ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

  /* ── HIGHLIGHT ── */
  mark.found {
    background: rgba(247,197,106,0.3);
    color: var(--amber);
    border-radius: 2px;
  }
  mark.found.current {
    background: rgba(124,106,247,0.4);
    color: var(--accent2);
  }
</style>
</head>
<body>

<!-- TITLEBAR -->
<div id="titlebar">
  <span id="logo">VOID<span>notes</span></span>
  <div id="tabs-container"></div>
  <button id="new-tab-btn" title="New tab">+</button>
  <div id="titlebar-actions">
    <button class="tbar-btn" onclick="toggleSidebar()">☰ Files</button>
    <button class="tbar-btn" onclick="openCmd()">⌘ Command</button>
    <button class="tbar-btn accent" onclick="saveCurrentNote()">↓ Save</button>
  </div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="tool-btn" onclick="fmt('bold')" title="Bold (Ctrl+B)">
    <svg viewBox="0 0 24 24"><path d="M6 12h8a4 4 0 000-8H6v8zm0 0h9a4 4 0 010 8H6V12z"/></svg>B
  </button>
  <button class="tool-btn" onclick="fmt('italic')" title="Italic (Ctrl+I)">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" d="M19 4h-9M14 20H5M14.7 4L9.4 20"/></svg>I
  </button>
  <button class="tool-btn" onclick="insertMD('~~','~~')" title="Strikethrough">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" d="M5 12h14M17.5 7.5C17.5 5.6 15.4 4 12 4s-5 1.3-5 3.5c0 2 1.5 3 4 3.5M6.5 16.5C6.5 18.4 8.6 20 12 20s5-1.3 5-3.5"/></svg>
  </button>
  <div class="tool-sep"></div>
  <button class="tool-btn" onclick="insertMD('# ','',true)" title="Heading 1">H1</button>
  <button class="tool-btn" onclick="insertMD('## ','',true)" title="Heading 2">H2</button>
  <button class="tool-btn" onclick="insertMD('### ','',true)" title="Heading 3">H3</button>
  <div class="tool-sep"></div>
  <button class="tool-btn" onclick="insertMD('- ','',true)" title="Bullet list">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" d="M9 6h12M9 12h12M9 18h12M4 6h.01M4 12h.01M4 18h.01"/></svg>
  </button>
  <button class="tool-btn" onclick="insertMD('1. ','',true)" title="Numbered list">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" d="M10 6h12M10 12h12M10 18h12M4 7V4l-2 1M4.7 14a1.3 1.3 0 10-2.5.5L4 17H2M3 21h2M2 21h3"/></svg>
  </button>
  <button class="tool-btn" onclick="insertMD('> ','',true)" title="Quote">&ldquo;</button>
  <button class="tool-btn" onclick="insertMD('`','`')" title="Inline code">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 9l-4 3 4 3M16 9l4 3-4 3M14 4l-4 16"/></svg>
  </button>
  <button class="tool-btn" onclick="insertCodeBlock()" title="Code block">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path stroke-linecap="round" d="M7 8l-3 4 3 4M17 8l3 4-3 4"/></svg>
  </button>
  <button class="tool-btn" onclick="insertMD('[','](url)')" title="Insert link">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path stroke-linecap="round" d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
  </button>
  <div class="tool-sep"></div>
  <button class="tool-btn" id="btn-focus" onclick="toggleFocus()" title="Focus mode">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
    Focus
  </button>
  <button class="tool-btn" id="btn-linenos" onclick="toggleLineNums()" title="Toggle line numbers">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    #
  </button>
  <button class="tool-btn" onclick="toggleFind()" title="Find & Replace (Ctrl+F)">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg>
    Find
  </button>
  <button class="tool-btn" onclick="toggleSnippets()" title="Snippets">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><path stroke-linecap="round" d="M13 2v7h7"/></svg>
    Snippets
  </button>
  <button class="tool-btn" onclick="sortLines()" title="Sort lines alphabetically">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" d="M3 6h18M7 12h10M11 18h2"/></svg>
    Sort
  </button>
  <button class="tool-btn" onclick="removeDuplicates()" title="Remove duplicate lines">Dedup</button>
  <button class="tool-btn" onclick="copyAll()" title="Copy all text">
    <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path stroke-linecap="round" d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
    Copy
  </button>
  <div id="word-count-badge">0 words</div>
</div>

<!-- MAIN -->
<div id="main">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <span>Notes</span>
      <span id="note-count" style="font-family:var(--font-code);font-size:11px;color:var(--text3)">0</span>
    </div>
    <div id="search-box">
      <span class="search-icon">⌕</span>
      <input type="text" id="search-input" placeholder="Search notes…" oninput="searchNotes(this.value)">
    </div>
    <div id="notes-list"></div>
    <div id="sidebar-footer">
      <button id="new-note-btn" onclick="createNote()">+ New Note</button>
    </div>
  </div>

  <!-- EDITOR AREA -->
  <div id="editor-area">
    <div id="editor-wrapper">
      <div id="line-numbers"></div>
      <textarea id="editor" spellcheck="true" placeholder="Start typing… or press ⌘ for commands"></textarea>
      <div id="focus-overlay"></div>
    </div>

    <!-- FIND BAR -->
    <div id="findbar">
      <input type="text" id="find-input" placeholder="Find…" oninput="doFind()">
      <input type="text" id="replace-input" placeholder="Replace…" style="width:140px">
      <span class="find-count" id="find-count">0/0</span>
      <button class="find-btn" onclick="findPrev()" title="Previous">↑</button>
      <button class="find-btn" onclick="findNext()" title="Next">↓</button>
      <button class="find-btn" onclick="doReplace()" title="Replace" style="width:auto;padding:0 8px;font-size:11px">Replace</button>
      <button class="find-btn" onclick="toggleFind()" title="Close">✕</button>
    </div>

    <!-- SNIPPETS PANEL -->
    <div id="snippets-panel">
      <div id="snippets-header">
        <span>Snippets</span>
        <span style="cursor:pointer" onclick="toggleSnippets()">✕</span>
      </div>
      <div id="snippets-list"></div>
    </div>
  </div>
</div>

<!-- STATUS BAR -->
<div id="statusbar">
  <span id="stat-pos">Ln 1, Col 1</span>
  <span class="sep"></span>
  <span id="stat-words">0 words</span>
  <span class="sep"></span>
  <span id="stat-chars">0 chars</span>
  <span class="sep"></span>
  <span id="stat-lines">0 lines</span>
  <span class="sep"></span>
  <span id="stat-saved" class="status-saved">● Saved</span>
  <span class="status-mode" id="stat-mode">NORMAL</span>
</div>

<!-- COMMAND PALETTE -->
<div id="cmd-overlay" onclick="closeCmd(event)">
  <div id="cmd-palette">
    <div id="cmd-input-wrap">
      <span class="cmd-icon">⌘</span>
      <input type="text" id="cmd-input" placeholder="Type a command or search notes…" oninput="filterCmd(this.value)" onkeydown="cmdKey(event)" autocomplete="off">
    </div>
    <div id="cmd-results"></div>
    <div id="cmd-footer">
      <span class="cmd-hint"><kbd>↑↓</kbd> Navigate</span>
      <span class="cmd-hint"><kbd>↵</kbd> Select</span>
      <span class="cmd-hint"><kbd>Esc</kbd> Close</span>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const STORAGE_KEY = 'voidnotes_v2';
let notes = [];
let activeNoteId = null;
let tabs = [];
let activeTabId = null;
let focusMode = false;
let lineNumsVisible = true;
let saveTimer = null;
let findMatches = [];
let findIndex = 0;

const snippets = [
  { trigger: '!todo', desc: 'TODO comment', body: '// TODO: ' },
  { trigger: '!fix', desc: 'FIXME comment', body: '// FIXME: ' },
  { trigger: '!note', desc: 'NOTE comment', body: '// NOTE: ' },
  { trigger: '!date', desc: 'Insert today\'s date', body: () => new Date().toLocaleDateString() },
  { trigger: '!time', desc: 'Insert current time', body: () => new Date().toLocaleTimeString() },
  { trigger: '!dt', desc: 'Insert datetime', body: () => new Date().toLocaleString() },
  { trigger: '!sep', desc: 'Separator line', body: '\n────────────────────────────────────\n' },
  { trigger: '!md', desc: 'Markdown template', body: '# Title\n\n## Summary\n\n## Details\n\n## Notes\n' },
  { trigger: '!meeting', desc: 'Meeting notes template', body: '# Meeting — ' + new Date().toLocaleDateString() + '\n\n**Attendees:**\n\n**Agenda:**\n\n**Notes:**\n\n**Action Items:**\n- [ ] \n' },
  { trigger: '!code', desc: 'Code block', body: '```javascript\n\n```' },
  { trigger: '!table', desc: 'Markdown table', body: '| Column 1 | Column 2 | Column 3 |\n|----------|----------|----------|\n| Cell     | Cell     | Cell     |\n' },
];

const commands = [
  { icon: '📄', title: 'New note', sub: 'Create a blank note', kbd: 'Ctrl+N', action: () => { closeCmd(); createNote(); } },
  { icon: '💾', title: 'Save note', sub: 'Save current note', kbd: 'Ctrl+S', action: () => { closeCmd(); saveCurrentNote(); } },
  { icon: '🔍', title: 'Find & Replace', sub: 'Search in current note', kbd: 'Ctrl+F', action: () => { closeCmd(); toggleFind(); } },
  { icon: '🎯', title: 'Focus mode', sub: 'Distraction-free editing', kbd: 'F11', action: () => { closeCmd(); toggleFocus(); } },
  { icon: '#', title: 'Toggle line numbers', sub: 'Show or hide line numbers', action: () => { closeCmd(); toggleLineNums(); } },
  { icon: '📋', title: 'Copy all', sub: 'Copy entire note to clipboard', kbd: 'Ctrl+A,C', action: () => { closeCmd(); copyAll(); } },
  { icon: '🔤', title: 'UPPERCASE', sub: 'Convert selection to uppercase', action: () => { closeCmd(); transformCase('upper'); } },
  { icon: '🔡', title: 'lowercase', sub: 'Convert selection to lowercase', action: () => { closeCmd(); transformCase('lower'); } },
  { icon: '🔀', title: 'Sort lines', sub: 'Sort all lines alphabetically', action: () => { closeCmd(); sortLines(); } },
  { icon: '✂️', title: 'Remove duplicates', sub: 'Remove duplicate lines', action: () => { closeCmd(); removeDuplicates(); } },
  { icon: '📊', title: 'Word count', sub: 'Show document statistics', action: () => { closeCmd(); showStats(); } },
  { icon: '⬇️', title: 'Export as .txt', sub: 'Download note as text file', action: () => { closeCmd(); exportTxt(); } },
  { icon: '📝', title: 'Export as .md', sub: 'Download note as Markdown', action: () => { closeCmd(); exportMd(); } },
  { icon: '📋', title: 'Snippets panel', sub: 'Open snippets sidebar', action: () => { closeCmd(); toggleSnippets(); } },
  { icon: '🗑️', title: 'Delete note', sub: 'Delete current note', action: () => { closeCmd(); deleteCurrentNote(); } },
];

let cmdItems = [...commands];
let cmdSelected = 0;

// ── LOAD / SAVE ──
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) notes = JSON.parse(raw);
  } catch(e) { notes = []; }
  if (!notes.length) {
    notes.push({
      id: uid(),
      title: 'Welcome to VOID',
      content: `# Welcome to VOID Notes\n\nYour next-level notepad is ready.\n\n## Quick Tips\n\n- Press **Ctrl+P** or **⌘ Command** to open the command palette\n- Type **!** in the editor to trigger snippets\n- Use the toolbar above for formatting\n- All notes auto-save to your browser\n- **Ctrl+F** for find & replace\n- **F11** for focus mode\n\n## Keyboard Shortcuts\n\n| Action | Shortcut |\n|--------|----------|\n| New note | Ctrl+N |\n| Save | Ctrl+S |\n| Find | Ctrl+F |\n| Command palette | Ctrl+P |\n| Focus mode | F11 |\n\nHappy writing! ✨`,
      lang: 'md',
      created: Date.now(),
      updated: Date.now()
    });
  }
  renderNotesList();
  openNote(notes[0].id);
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
  markSaved();
}

function uid() { return Math.random().toString(36).substr(2,9); }

// ── NOTES ──
function createNote() {
  const note = {
    id: uid(),
    title: 'untitled-' + (notes.length + 1),
    content: '',
    lang: 'txt',
    created: Date.now(),
    updated: Date.now()
  };
  notes.unshift(note);
  saveData();
  renderNotesList();
  openNote(note.id);
  toast('New note created');
}

function openNote(id) {
  saveActiveNote();
  activeNoteId = id;
  const note = notes.find(n => n.id === id);
  if (!note) return;
  document.getElementById('editor').value = note.content;
  updateWordCount();
  updateLineNumbers();
  renderNotesList();
  openTab(note);
  markSaved();
  document.getElementById('editor').focus();
}

function saveActiveNote() {
  if (!activeNoteId) return;
  const note = notes.find(n => n.id === activeNoteId);
  if (!note) return;
  note.content = document.getElementById('editor').value;
  note.updated = Date.now();
}

function saveCurrentNote() {
  saveActiveNote();
  saveData();
  markTabSaved();
}

function deleteCurrentNote() {
  if (!activeNoteId) return;
  if (!confirm('Delete this note?')) return;
  notes = notes.filter(n => n.id !== activeNoteId);
  tabs = tabs.filter(t => t.id !== activeNoteId);
  activeNoteId = null;
  saveData();
  renderNotesList();
  renderTabs();
  if (notes.length) openNote(notes[0].id);
  else document.getElementById('editor').value = '';
  toast('Note deleted');
}

function deleteNote(id, e) {
  e && e.stopPropagation();
  if (notes.length === 1) { toast('Cannot delete last note'); return; }
  notes = notes.filter(n => n.id !== id);
  tabs = tabs.filter(t => t.id !== id);
  if (activeNoteId === id) {
    activeNoteId = null;
    if (notes.length) openNote(notes[0].id);
  }
  saveData();
  renderNotesList();
  renderTabs();
}

function renderNotesList(filter = '') {
  const list = document.getElementById('notes-list');
  const filtered = filter
    ? notes.filter(n => n.title.toLowerCase().includes(filter.toLowerCase()) || n.content.toLowerCase().includes(filter.toLowerCase()))
    : notes;

  document.getElementById('note-count').textContent = filtered.length;
  list.innerHTML = filtered.map(note => `
    <div class="note-item${note.id === activeNoteId ? ' active' : ''}" onclick="openNote('${note.id}')">
      <div class="note-title">${escHtml(note.title)}</div>
      <div class="note-preview">${escHtml(note.content.replace(/[#*`>\-]/g,'').trim().substring(0,50)) || '—'}</div>
      <div class="note-meta">
        <span class="note-date">${relativeTime(note.updated)}</span>
        <span class="note-tag ${note.lang}">${note.lang}</span>
      </div>
      <span class="note-del" onclick="deleteNote('${note.id}',event)">✕</span>
    </div>
  `).join('');
}

function searchNotes(val) { renderNotesList(val); }

// ── TABS ──
function openTab(note) {
  if (!tabs.find(t => t.id === note.id)) {
    tabs.push({ id: note.id, title: note.title, modified: false });
    if (tabs.length > 8) {
      const oldest = tabs.find(t => t.id !== note.id);
      if (oldest) tabs = tabs.filter(t => t.id !== oldest.id);
    }
  }
  activeTabId = note.id;
  renderTabs();
}

function closeTab(id, e) {
  e && e.stopPropagation();
  tabs = tabs.filter(t => t.id !== id);
  if (activeTabId === id) {
    activeTabId = tabs.length ? tabs[tabs.length - 1].id : null;
    if (activeTabId) openNote(activeTabId);
    else document.getElementById('editor').value = '';
  }
  renderTabs();
}

function renderTabs() {
  const container = document.getElementById('tabs-container');
  container.innerHTML = tabs.map(tab => `
    <div class="tab${tab.id === activeTabId ? ' active' : ''}${tab.modified ? ' modified' : ''}" onclick="openNote('${tab.id}')">
      <span class="tab-dot"></span>
      <span>${escHtml(tab.title)}</span>
      <span class="tab-close" onclick="closeTab('${tab.id}',event)">✕</span>
    </div>
  `).join('');
}

function markTabModified() {
  const tab = tabs.find(t => t.id === activeNoteId);
  if (tab) { tab.modified = true; renderTabs(); }
  document.getElementById('stat-saved').textContent = '● Unsaved';
  document.getElementById('stat-saved').style.color = 'var(--amber)';
}

function markTabSaved() {
  const tab = tabs.find(t => t.id === activeNoteId);
  if (tab) { tab.modified = false; renderTabs(); }
  markSaved();
}

function markSaved() {
  document.getElementById('stat-saved').textContent = '● Saved';
  document.getElementById('stat-saved').style.color = 'var(--green)';
}

// ── EDITOR EVENTS ──
const editor = document.getElementById('editor');

editor.addEventListener('input', () => {
  markTabModified();
  updateWordCount();
  updateLineNumbers();
  checkSnippets();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveCurrentNote, 1500);
});

editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + 2;
    markTabModified();
    return;
  }
  if (e.key === 'Enter') {
    const pos = editor.selectionStart;
    const lines = editor.value.substring(0, pos).split('\n');
    const curLine = lines[lines.length - 1];
    const listMatch = curLine.match(/^(\s*)([-*+]|\d+\.)\s/);
    if (listMatch) {
      e.preventDefault();
      const indent = listMatch[1];
      const bullet = listMatch[2];
      const newBullet = /^\d+\./.test(bullet) ? (parseInt(bullet) + 1) + '.' : bullet;
      const insert = '\n' + indent + newBullet + ' ';
      editor.value = editor.value.substring(0, pos) + insert + editor.value.substring(pos);
      editor.selectionStart = editor.selectionEnd = pos + insert.length;
      markTabModified();
    }
  }
});

editor.addEventListener('keyup', updateCursorPos);
editor.addEventListener('click', updateCursorPos);
editor.addEventListener('scroll', syncScroll);

function syncScroll() {
  const lineNums = document.getElementById('line-numbers');
  lineNums.scrollTop = editor.scrollTop;
}

function updateCursorPos() {
  const val = editor.value;
  const pos = editor.selectionStart;
  const lines = val.substring(0, pos).split('\n');
  const ln = lines.length;
  const col = lines[lines.length - 1].length + 1;
  document.getElementById('stat-pos').textContent = `Ln ${ln}, Col ${col}`;
}

function updateWordCount() {
  const val = editor.value;
  const words = val.trim() ? val.trim().split(/\s+/).length : 0;
  const chars = val.length;
  const lines = val.split('\n').length;
  document.getElementById('stat-words').textContent = `${words} words`;
  document.getElementById('stat-chars').textContent = `${chars} chars`;
  document.getElementById('stat-lines').textContent = `${lines} lines`;
  document.getElementById('word-count-badge').textContent = `${words} words`;
}

function updateLineNumbers() {
  const lines = editor.value.split('\n').length;
  const nums = Array.from({length: lines}, (_,i) => i + 1).join('\n');
  document.getElementById('line-numbers').textContent = nums;
}

// ── FORMATTING ──
function fmt(type) {
  const start = editor.selectionStart;
  const end = editor.selectionEnd;
  const sel = editor.value.substring(start, end);
  let prefix = '', suffix = '';
  if (type === 'bold') { prefix = '**'; suffix = '**'; }
  if (type === 'italic') { prefix = '_'; suffix = '_'; }
  const replacement = prefix + (sel || 'text') + suffix;
  editor.value = editor.value.substring(0, start) + replacement + editor.value.substring(end);
  editor.selectionStart = sel ? start : start + prefix.length;
  editor.selectionEnd = sel ? start + replacement.length : start + prefix.length + 4;
  editor.focus();
  markTabModified();
}

function insertMD(prefix, suffix = '', lineStart = false) {
  const start = editor.selectionStart;
  const end = editor.selectionEnd;
  const sel = editor.value.substring(start, end);
  let insert;
  if (lineStart) {
    const lineStart2 = editor.value.lastIndexOf('\n', start - 1) + 1;
    insert = prefix + (sel || 'text') + suffix;
    editor.value = editor.value.substring(0, lineStart2) + insert + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = lineStart2 + insert.length;
  } else {
    insert = prefix + (sel || 'text') + suffix;
    editor.value = editor.value.substring(0, start) + insert + editor.value.substring(end);
    editor.selectionStart = sel ? start : start + prefix.length;
    editor.selectionEnd = sel ? start + insert.length : start + prefix.length + 4;
  }
  editor.focus();
  markTabModified();
}

function insertCodeBlock() {
  const pos = editor.selectionStart;
  const insert = '```\n\n```';
  editor.value = editor.value.substring(0, pos) + insert + editor.value.substring(pos);
  editor.selectionStart = editor.selectionEnd = pos + 4;
  editor.focus();
  markTabModified();
}

function transformCase(dir) {
  const start = editor.selectionStart;
  const end = editor.selectionEnd;
  if (start === end) return;
  const sel = editor.value.substring(start, end);
  const transformed = dir === 'upper' ? sel.toUpperCase() : sel.toLowerCase();
  editor.value = editor.value.substring(0, start) + transformed + editor.value.substring(end);
  editor.selectionStart = start;
  editor.selectionEnd = start + transformed.length;
  markTabModified();
}

function sortLines() {
  const lines = editor.value.split('\n');
  editor.value = lines.sort((a, b) => a.localeCompare(b)).join('\n');
  updateWordCount(); updateLineNumbers(); markTabModified();
  toast('Lines sorted');
}

function removeDuplicates() {
  const lines = editor.value.split('\n');
  const seen = new Set();
  const uniq = lines.filter(l => { if (seen.has(l)) return false; seen.add(l); return true; });
  const removed = lines.length - uniq.length;
  editor.value = uniq.join('\n');
  updateWordCount(); updateLineNumbers(); markTabModified();
  toast(`Removed ${removed} duplicate line${removed !== 1 ? 's' : ''}`);
}

function copyAll() {
  navigator.clipboard.writeText(editor.value).then(() => toast('Copied to clipboard'));
}

function showStats() {
  const val = editor.value;
  const words = val.trim() ? val.trim().split(/\s+/).length : 0;
  const chars = val.length;
  const lines = val.split('\n').length;
  const readTime = Math.ceil(words / 200);
  toast(`${words} words · ${chars} chars · ${lines} lines · ~${readTime} min read`);
}

function exportTxt() {
  const note = notes.find(n => n.id === activeNoteId);
  if (!note) return;
  download(note.title + '.txt', editor.value, 'text/plain');
}

function exportMd() {
  const note = notes.find(n => n.id === activeNoteId);
  if (!note) return;
  download(note.title + '.md', editor.value, 'text/markdown');
}

function download(filename, content, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], {type: mime}));
  a.download = filename;
  a.click();
  toast(`Exported ${filename}`);
}

// ── FIND & REPLACE ──
let findOpen = false;

function toggleFind() {
  findOpen = !findOpen;
  const bar = document.getElementById('findbar');
  bar.classList.toggle('open', findOpen);
  if (findOpen) {
    document.getElementById('find-input').focus();
    const sel = editor.value.substring(editor.selectionStart, editor.selectionEnd);
    if (sel) { document.getElementById('find-input').value = sel; doFind(); }
  } else {
    findMatches = []; findIndex = 0;
    document.getElementById('find-count').textContent = '0/0';
  }
}

function doFind() {
  const term = document.getElementById('find-input').value;
  if (!term) { document.getElementById('find-count').textContent = '0/0'; return; }
  const val = editor.value;
  findMatches = [];
  let idx = 0;
  const lower = val.toLowerCase();
  const termLower = term.toLowerCase();
  while ((idx = lower.indexOf(termLower, idx)) !== -1) {
    findMatches.push(idx);
    idx += term.length;
  }
  findIndex = 0;
  updateFindCount();
  if (findMatches.length) jumpToMatch();
}

function updateFindCount() {
  document.getElementById('find-count').textContent =
    findMatches.length ? `${findIndex + 1}/${findMatches.length}` : '0/0';
}

function jumpToMatch() {
  if (!findMatches.length) return;
  const idx = findMatches[findIndex];
  const term = document.getElementById('find-input').value;
  editor.focus();
  editor.setSelectionRange(idx, idx + term.length);
  updateFindCount();
}

function findNext() {
  if (!findMatches.length) return;
  findIndex = (findIndex + 1) % findMatches.length;
  jumpToMatch();
}

function findPrev() {
  if (!findMatches.length) return;
  findIndex = (findIndex - 1 + findMatches.length) % findMatches.length;
  jumpToMatch();
}

function doReplace() {
  const term = document.getElementById('find-input').value;
  const rep = document.getElementById('replace-input').value;
  if (!term) return;
  const replaced = editor.value.split(term).join(rep);
  const count = (editor.value.match(new RegExp(escRe(term), 'gi')) || []).length;
  editor.value = replaced;
  markTabModified();
  toast(`Replaced ${count} occurrence${count !== 1 ? 's' : ''}`);
  doFind();
}

function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

// ── FOCUS MODE ──
function toggleFocus() {
  focusMode = !focusMode;
  editor.classList.toggle('focus-mode', focusMode);
  document.getElementById('focus-overlay').classList.toggle('active', focusMode);
  document.getElementById('btn-focus').classList.toggle('active', focusMode);
  document.getElementById('stat-mode').textContent = focusMode ? 'FOCUS' : 'NORMAL';
  toast(focusMode ? 'Focus mode on' : 'Focus mode off');
}

// ── LINE NUMBERS ──
function toggleLineNums() {
  lineNumsVisible = !lineNumsVisible;
  document.getElementById('line-numbers').classList.toggle('hidden', !lineNumsVisible);
  document.getElementById('btn-linenos').classList.toggle('active', lineNumsVisible);
}

// ── SIDEBAR ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// ── SNIPPETS ──
function toggleSnippets() {
  const panel = document.getElementById('snippets-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) renderSnippets();
}

function renderSnippets() {
  document.getElementById('snippets-list').innerHTML = snippets.map((s,i) => `
    <div class="snippet-item" onclick="insertSnippet(${i})">
      <div class="snippet-trigger">${s.trigger}</div>
      <div class="snippet-desc">${s.desc}</div>
    </div>
  `).join('');
}

function insertSnippet(i) {
  const s = snippets[i];
  const body = typeof s.body === 'function' ? s.body() : s.body;
  const pos = editor.selectionStart;
  editor.value = editor.value.substring(0, pos) + body + editor.value.substring(pos);
  editor.selectionStart = editor.selectionEnd = pos + body.length;
  editor.focus();
  markTabModified();
  toggleSnippets();
  toast(`Inserted: ${s.trigger}`);
}

function checkSnippets() {
  const pos = editor.selectionStart;
  const before = editor.value.substring(0, pos);
  for (const s of snippets) {
    if (before.endsWith(s.trigger)) {
      const body = typeof s.body === 'function' ? s.body() : s.body;
      const start = pos - s.trigger.length;
      editor.value = editor.value.substring(0, start) + body + editor.value.substring(pos);
      editor.selectionStart = editor.selectionEnd = start + body.length;
      markTabModified();
      toast(`Snippet: ${s.trigger}`);
      return;
    }
  }
}

// ── COMMAND PALETTE ──
function openCmd() {
  document.getElementById('cmd-overlay').classList.add('open');
  document.getElementById('cmd-input').value = '';
  cmdItems = [...commands];
  cmdSelected = 0;
  renderCmd();
  setTimeout(() => document.getElementById('cmd-input').focus(), 50);
}

function closeCmd(e) {
  if (!e || e.target.id === 'cmd-overlay') {
    document.getElementById('cmd-overlay').classList.remove('open');
  }
}

function filterCmd(val) {
  if (!val) {
    cmdItems = [...commands];
  } else {
    const search = val.toLowerCase();
    const noteMatches = notes
      .filter(n => n.title.toLowerCase().includes(search) || n.content.toLowerCase().includes(search))
      .map(n => ({ icon: '📄', title: n.title, sub: n.content.substring(0, 60) + '...', action: () => { closeCmd(); openNote(n.id); } }));
    const cmdMatches = commands.filter(c => c.title.toLowerCase().includes(search) || (c.sub || '').toLowerCase().includes(search));
    cmdItems = [...cmdMatches, ...noteMatches];
  }
  cmdSelected = 0;
  renderCmd();
}

function renderCmd() {
  const list = document.getElementById('cmd-results');
  if (!cmdItems.length) { list.innerHTML = '<div style="padding:20px;text-align:center;font-family:var(--font-code);font-size:12px;color:var(--text3)">No results</div>'; return; }
  list.innerHTML = cmdItems.map((item, i) => `
    <div class="cmd-item${i === cmdSelected ? ' selected' : ''}" onclick="runCmd(${i})">
      <div class="cmd-item-icon">${item.icon}</div>
      <div class="cmd-item-text">
        <div class="cmd-item-title">${item.title}</div>
        ${item.sub ? `<div class="cmd-item-sub">${item.sub}</div>` : ''}
      </div>
      ${item.kbd ? `<span class="cmd-item-kbd">${item.kbd}</span>` : ''}
    </div>
  `).join('');
}

function runCmd(i) {
  if (cmdItems[i]) cmdItems[i].action();
  document.getElementById('cmd-overlay').classList.remove('open');
}

function cmdKey(e) {
  if (e.key === 'Escape') { closeCmd(); return; }
  if (e.key === 'ArrowDown') { e.preventDefault(); cmdSelected = Math.min(cmdSelected + 1, cmdItems.length - 1); renderCmd(); return; }
  if (e.key === 'ArrowUp') { e.preventDefault(); cmdSelected = Math.max(cmdSelected - 1, 0); renderCmd(); return; }
  if (e.key === 'Enter') { e.preventDefault(); runCmd(cmdSelected); }
}

// ── GLOBAL KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', e => {
  const ctrl = e.ctrlKey || e.metaKey;
  if (ctrl && e.key === 'p') { e.preventDefault(); openCmd(); }
  if (ctrl && e.key === 'n') { e.preventDefault(); createNote(); }
  if (ctrl && e.key === 's') { e.preventDefault(); saveCurrentNote(); }
  if (ctrl && e.key === 'f') { e.preventDefault(); toggleFind(); }
  if (e.key === 'F11') { e.preventDefault(); toggleFocus(); }
  if (e.key === 'Escape') { if (findOpen) toggleFind(); closeCmd(); }
});

// ── TOAST ──
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── UTILS ──
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function relativeTime(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return new Date(ts).toLocaleDateString();
}

// ── INIT ──
loadData();
updateLineNumbers();
renderSnippets();
</script>
