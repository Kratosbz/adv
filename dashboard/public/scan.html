<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invite Authenticator | Send-Forth Party</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Segoe UI',sans-serif;
  background:#0d1b2e;
  color:#fff;
  min-height:100vh;
}
header{
  background:linear-gradient(135deg,#0d1b2e 0%,#1a2f4e 100%);
  border-bottom:2px solid #D4AF37;
  padding:16px 20px;
  text-align:center;
}
header h1{color:#D4AF37;font-size:1.15rem;letter-spacing:2px;text-transform:uppercase;}
header p{color:#8899aa;font-size:0.73rem;margin-top:4px;}

/* SCANNER */
#scanner-section{padding:16px;}
#reader{
  width:100%;max-width:420px;margin:0 auto;
  border-radius:12px;overflow:hidden;
  border:2px solid #D4AF37;
  background:#000;
  position:relative;
}
/* overlay crosshair */
#reader::after{
  content:'';position:absolute;
  inset:0;pointer-events:none;
  background:
    linear-gradient(rgba(0,0,0,0) calc(50% - 60px), rgba(212,175,55,0.15) calc(50% - 60px), rgba(212,175,55,0.15) calc(50% + 60px), rgba(0,0,0,0) calc(50% + 60px)),
    linear-gradient(90deg, rgba(0,0,0,0) calc(50% - 60px), rgba(212,175,55,0.15) calc(50% - 60px), rgba(212,175,55,0.15) calc(50% + 60px), rgba(0,0,0,0) calc(50% + 60px));
}
.scan-hint{text-align:center;color:#556677;font-size:0.78rem;margin:10px 0 4px;padding:8px;background:#111e30;border-radius:8px;}

/* CAPTURE BUTTON */
#capture-btn{
  display:block;width:100%;max-width:420px;margin:12px auto 0;
  padding:13px;
  background:linear-gradient(135deg,#a07a1a,#D4AF37);
  color:#0d1b2e;font-weight:bold;font-size:0.95rem;
  letter-spacing:1px;border:none;border-radius:10px;cursor:pointer;
  transition:opacity 0.2s;
}
#capture-btn:hover{opacity:0.9;}
#capture-btn:disabled{opacity:0.4;cursor:not-allowed;}

/* CAPTURED PREVIEW */
#captured-section{display:none;padding:0 16px;}
#captured-img{
  width:100%;max-width:420px;display:block;
  margin:0 auto;border-radius:10px;
  border:2px solid rgba(212,175,55,0.4);
}
#retake-btn{
  display:block;width:100%;max-width:420px;margin:10px auto 0;
  padding:10px;background:#1a2f4e;color:#D4AF37;
  border:1px dashed #D4AF37;border-radius:8px;cursor:pointer;font-size:0.85rem;
}

/* LOADER */
#loader{display:none;text-align:center;padding:24px 16px;}
.spinner{
  width:44px;height:44px;border:3px solid rgba(212,175,55,0.2);
  border-top-color:#D4AF37;border-radius:50%;
  animation:spin 0.8s linear infinite;margin:0 auto 10px;
}
@keyframes spin{to{transform:rotate(360deg);}}
#loader p{color:#8899aa;font-size:0.8rem;}

/* RESULT */
#result-box{
  display:none;margin:16px;border-radius:14px;
  padding:22px 18px;text-align:center;
  animation:fadeUp 0.4s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;}}
#result-box.authentic{background:linear-gradient(135deg,#061a0e,#082a14);border:2px solid #2ecc71;}
#result-box.suspicious{background:linear-gradient(135deg,#1a0600,#2a0a00);border:2px solid #e74c3c;}
#result-box.uncertain{background:linear-gradient(135deg,#1a1000,#2a1a00);border:2px solid #f39c12;}

.r-icon{font-size:3rem;margin-bottom:8px;display:block;}
.r-verdict{font-size:1.2rem;font-weight:bold;letter-spacing:2px;margin-bottom:8px;text-transform:uppercase;}
.authentic .r-verdict{color:#2ecc71;}
.suspicious .r-verdict{color:#e74c3c;}
.uncertain .r-verdict{color:#f39c12;}
.r-confidence{font-size:0.75rem;color:#8899aa;margin-bottom:10px;}
.r-summary{font-size:0.82rem;color:#aabbcc;line-height:1.6;}
.r-checks{margin-top:14px;text-align:left;display:flex;flex-direction:column;gap:7px;}
.check-row{display:flex;align-items:flex-start;gap:9px;font-size:0.77rem;color:#8899aa;}
.check-pass{color:#2ecc71;}
.check-fail{color:#e74c3c;}
.check-warn{color:#f39c12;}
.r-notes{font-size:0.73rem;color:#667788;font-style:italic;margin-top:10px;line-height:1.5;}
#scan-next-btn{
  margin-top:16px;padding:10px 28px;
  background:#D4AF37;color:#0d1b2e;
  border:none;border-radius:8px;font-weight:bold;
  font-size:0.88rem;cursor:pointer;
}
.camera-error{
  text-align:center;padding:30px 20px;color:#e74c3c;font-size:0.85rem;
}
</style>
</head>
<body>

<header>
  <h1>🔍 Invite Authenticator</h1>
  <p>Send-Forth Party for Barr. Osondu Peter Okoro</p>

<!-- LIVE CAMERA SECTION -->
<div id="scanner-section">

<!-- CAPTURED PREVIEW -->
<div id="captured-section">

  <button id="retake-btn">↩ Retake</button>
</div>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
  <p>Analysing invite…</p>
</div>

<!-- RESULT -->
<div id="result-box">

  <div class="r-confidence" id="r-confidence"></div>
  <div class="r-summary" id="r-summary"></div>
  <div class="r-checks" id="r-checks"></div>
  <div class="r-notes" id="r-notes"></div>

const readerDiv       = document.getElementById('reader');

// ── Start camera ──────────────────────────────────────────────────────────────
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'environment', width:{ideal:1280}, height:{ideal:720} }
    });
    videoEl = document.createElement('video');
    videoEl.srcObject = stream;
    videoEl.setAttribute('playsinline','');
    videoEl.autoplay = true;
    videoEl.style.cssText = 'width:100%;display:block;';
    readerDiv.appendChild(videoEl);
    await videoEl.play();
  } catch(err) {
    readerDiv.innerHTML = `<div class="camera-error">⚠️ Camera access denied.<br><small>Please allow camera permissions and reload.</small></div>`;
    captureBtn.disabled = true;
  }
}

// ── Capture frame ─────────────────────────────────────────────────────────────
captureBtn.addEventListener('click', () => {
  if(!videoEl || videoEl.readyState < 2) return;
  const canvas = document.createElement('canvas');
  canvas.width  = videoEl.videoWidth  || 640;
  canvas.height = videoEl.videoHeight || 480;
  canvas.getContext('2d').drawImage(videoEl, 0, 0);
  const dataURL = canvas.toDataURL('image/jpeg', 0.92);
  capturedB64 = dataURL.split(',')[1];

  capturedImg.src = dataURL;
  scannerSection.style.display  = 'none';
  capturedSection.style.display = 'block';

  // stop camera
  if(stream) stream.getTracks().forEach(t => t.stop());

  // auto-analyse
  analyseCapture();
});

// ── Retake ────────────────────────────────────────────────────────────────────
retakeBtn.addEventListener('click', () => resetAll());

// ── Analyse ───────────────────────────────────────────────────────────────────
async function analyseCapture() {
  capturedSection.style.display = 'none';
  loader.style.display = 'block';
  resultBox.style.display = 'none';

  const prompt = `You are a strict invite authentication system for a private event.

${FLYER_FACTS}

You have been given TWO images:
1. Image 1 = the OFFICIAL flyer
2. Image 2 = a photo just captured of a guest's invite that needs authentication

Compare them and determine: AUTHENTIC, SUSPICIOUS, or UNCERTAIN.

Check each item:
1. name   – Does it show "Barr. Osondu Peter Okoro" or "OSONDU PETER OKORO"?
2. date   – Does it show 21/05/2026?
3. time   – Does it show 1PM?
4. venue  – Does it mention Sapphire Hall / A Class Park / Kashim Ibrahim / Maitama / Abuja?
5. rsvp   – Does it have 08037005470 or 0806 134 5839?
6. visual – Does the overall design, colour scheme, layout match the official flyer?
7. people – Are three men visible with similar clothing/appearance?

Note: the captured image may be a photo of a phone screen, a printout, or a digital display — that is acceptable. Focus on content accuracy, not image quality.

Respond ONLY with valid JSON (no markdown):
{
  "verdict": "AUTHENTIC" | "SUSPICIOUS" | "UNCERTAIN",
  "confidence": 0-100,
  "summary": "one clear sentence",
  "checks": {
    "name": true|false|null,
    "date": true|false|null,
    "time": true|false|null,
    "venue": true|false|null,
    "rsvp": true|false|null,
    "visual": true|false|null,
    "people": true|false|null
  },
  "notes": "brief notes on any discrepancies, or empty string"
}`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:800,
        messages:[{
          role:"user",
          content:[
            { type:"image", source:{ type:"base64", media_type:OFFICIAL_MIME, data:OFFICIAL_B64 } },
            { type:"image", source:{ type:"base64", media_type:"image/jpeg",  data:capturedB64  } },
            { type:"text",  text:prompt }
          ]
        }]
      })
    });
    const data = await res.json();
    const raw  = data.content.map(c=>c.text||'').join('');
    const result = JSON.parse(raw.replace(/```json|```/g,'').trim());
    showResult(result);
  } catch(err) {
    showError(err.message);
  } finally {
    loader.style.display = 'none';
  }
}

// ── Show result ───────────────────────────────────────────────────────────────
function showResult(r) {
  const cls = r.verdict==='AUTHENTIC'?'authentic': r.verdict==='SUSPICIOUS'?'suspicious':'uncertain';
  resultBox.className = 'result-box ' + cls;

  const icons = {AUTHENTIC:'✅', SUSPICIOUS:'🚫', UNCERTAIN:'⚠️'};
  document.getElementById('r-icon').textContent       = icons[r.verdict]||'❓';
  document.getElementById('r-verdict').textContent    = r.verdict;
  document.getElementById('r-confidence').textContent = r.confidence ? `Confidence: ${r.confidence}%` : '';
  document.getElementById('r-summary').textContent    = r.summary||'';

  const labels = {
    name:   'Name: Barr. Osondu Peter Okoro',
    date:   'Date: 21/05/2026',
    time:   'Time: 1PM',
    venue:  'Venue: Sapphire Hall, Maitama Abuja',
    rsvp:   'RSVP numbers present',
    visual: 'Visual design matches official',
    people: 'Three people shown correctly'
  };
  let html = '';
  for(const [k,label] of Object.entries(labels)){
    const v = r.checks?.[k];
    const cls2 = v===true?'check-pass': v===false?'check-fail':'check-warn';
    const ico  = v===true?'✓': v===false?'✗':'?';
    html += `<div class="check-row"><span class="${cls2}">${ico}</span><span>${label}</span></div>`;
  }
  document.getElementById('r-checks').innerHTML = html;
  document.getElementById('r-notes').textContent = r.notes||'';
  resultBox.style.display = 'block';

  // vibration feedback
  if(navigator.vibrate){
    if(r.verdict==='AUTHENTIC') navigator.vibrate([100,50,100]);
    else if(r.verdict==='SUSPICIOUS') navigator.vibrate([300,100,300,100,300]);
  }
}

function showError(msg) {
  resultBox.className = 'result-box uncertain';
  document.getElementById('r-icon').textContent    = '⚠️';
  document.getElementById('r-verdict').textContent = 'ERROR';
  document.getElementById('r-confidence').textContent = '';
  document.getElementById('r-summary').textContent  = 'Could not analyse. Please try again.';
  document.getElementById('r-checks').innerHTML    = '';
  document.getElementById('r-notes').textContent   = msg||'';
  resultBox.style.display = 'block';
}

// ── Reset ─────────────────────────────────────────────────────────────────────
function resetAll() {
  capturedB64 = null;
  capturedImg.src = '';
  resultBox.style.display   = 'none';
  loader.style.display      = 'none';
  capturedSection.style.display = 'none';
  scannerSection.style.display  = 'block';
  readerDiv.innerHTML = '';
  captureBtn.disabled = false;
  startCamera();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
startCamera();
</script>
</body>
</html>
